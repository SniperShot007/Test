name: F39-Phase4-WIF-OIDC
on:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  phase4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: GitHub OIDC to T1 WIF Exchange
        run: python3 phase4_exchange.py
